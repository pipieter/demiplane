<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Chat</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      #messages {
        border: 1px solid #ccc;
        height: 300px;
        overflow-y: auto;
        margin-bottom: 10px;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <div id="drawing-container">
      <svg id="drawing" width="1280px" height="600px">
        <svg id="drawing-background">
          <rect fill="aliceblue" width="1280px" height="600px" />
        </svg>
        <svg id="drawing-objects"></svg>
        <svg id="drawing-selection">
          <rect
            id="drawing-selection-box"
            width="0"
            height="0"
            x="0"
            y="0"
            rx="8"
            ry="8"
            fill="none"
            stroke="red"
            style="pointer-events: none"
          />
        </svg>
      </svg>
    </div>
    <button id="random-circle-button">Add random circle</button>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>

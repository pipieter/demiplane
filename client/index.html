<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demiplane</title>
  </head>
  <body>
    <div id="drawing-container">
      <svg id="drawing" width="1280px" height="600px">
        <svg id="drawing-background">
          <defs>
            <pattern id="grid-pattern" width="40px" height="50" patternUnits="userSpaceOnUse">
              <path d="M 50 0 L 0 0 0 50"
                    fill="none"
                    stroke="#666"
                    stroke-width="1"/>
            </pattern>
          </defs>
          <rect fill="url(#grid-pattern)" width="1280px" height="600px" />
        </svg>

        </svg>
        <svg id="drawing-objects"></svg>
        <svg id="drawing-selection">
          <rect
            id="drawing-selection-box"
            width="0"
            height="0"
            x="0"
            y="0"
            rx="8"
            ry="8"
            fill="none"
            stroke="red"
            style="pointer-events: none"
          />
        </svg>
      </svg>
    </div>
    <button id="random-circle-button">Add random circle</button>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>

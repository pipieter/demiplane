<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <ul>
        <button id="random-circle-button">Add circle</button>
        <button>
          <input id="upload-token-button" type="file" accept="image/*">Upload a token</button>
        </button>
        <button>Placeholder</button>
        <button>Placeholder</button>
      </ul>
    </header>

    <div id="drawing-container">
      <svg id="drawing" width="100%" height="100vw">
        <svg id="drawing-background">
          <defs>
            <!-- Grid-size is declared through code -->
            <pattern id="grid-pattern" width="50px" height="50px" patternUnits="userSpaceOnUse">
              <path d="M 50 0 L 0 0 0 50"
                    fill="none"
                    stroke="#666"
                    stroke-width="1"/>
            </pattern>
          </defs>
          <rect fill="url(#grid-pattern)" width="100%" height="100%" />
        </svg>

        <svg id="drawing-objects"></svg>
      </svg>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</ihtml>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <aside class="sidebar-content" id="sidebar-content">
        <section id="tab-draw" class="tab-panel">
          <h2>Drawing</h2>
          <hr />
          <div class="square-button-container tab-panel-row">
            <button id="begin-circle-button" class="draw-button"><i class="fa-solid fa-circle"></i></button>
            <button id="begin-rect-button" class="draw-button"><i class="fa-solid fa-square"></i></button>
            <button id="begin-line-button" class="draw-button"><i class="fa-solid fa-minus"></i></button>
            <button id="begin-text-button" class="draw-button" disabled style="cursor: not-allowed">
              <i class="fa-solid fa-t"></i>
            </button>
            <button id="begin-drawing-button" class="draw-button"><i class="fa-solid fa-pencil"></i></button>
          </div>
          <div class="tab-panel-row color-picker-wrapper">
            <input type="color" id="draw-color-input" />
            <label for="draw-color-input" class="color-label">Select Color</label>
          </div>
          <div class="tab-panel-row">
            <input type="checkbox" id="draw-border-checkbox" />
            <label for="draw-border-checkbox">Border</label>
            <input type="number" id="draw-border-number" min="1" max="100" step="1" value="4" />
            <label for="draw-border-number">Width</label>
          </div>
          <hr />
          <div class="tab-panel-row">
            <label for="upload-token-button" class="label-button">
              <i class="fa-solid fa-image"></i> Upload a token
              <input id="upload-token-button" type="file" accept="image/*" style="display: none" />
            </label>
          </div>
        </section>

        <section id="tab-grid" class="tab-panel" hidden>
          <h2>Grid settings</h2>
          <hr />
          <input type="checkbox" id="grid-global-checkbox" />
          <label for="grid-global-checkbox">Enable grid-locking by default</label>
          <hr />
          <div class="tab-panel-row">
            <label for="grid-size">Grid-size</label>
            <input id="grid-size" type="number" name="grid-size" min="16" max="2048" step="1" value="64" />
          </div>
          <div class="tab-panel-row">
            <label for="grid-offset-X">X-offset</label>
            <input id="grid-offset-X" type="number" name="grid-offset-X" min="0" step="1" value="0" />
          </div>
          <div class="tab-panel-row">
            <label for="grid-offset-Y">Y-offset</label>
            <input id="grid-offset-Y" type="number" name="grid-offset-Y" min="0" step="1" value="0" />
          </div>
          <hr />
          <label for="upload-background-button" class="label-button">
            <i class="fa-regular fa-image"></i> Upload background
            <input id="upload-background-button" type="file" accept="image/*" style="display: none" />
          </label>
        </section>

        <section id="tab-token" class="tab-panel" hidden>
          <h2>Token Settings</h2>
          <hr />
          <div class="tab-panel-row">
            <label for="token-edit-x">x</label>
            <input id="token-edit-x" type="number" name="token-edit-x" min="0" step="1" value="64" disabled />
          </div>
          <div class="tab-panel-row">
            <label for="token-edit-y">y</label>
            <input id="token-edit-y" type="number" name="token-edit-y" min="0" step="1" value="64" disabled />
          </div>
          <div class="tab-panel-row">
            <label for="token-edit-w">width</label>
            <input id="token-edit-w" type="number" name="token-edit-w" min="8" step="1" value="64" disabled />
          </div>
          <div class="tab-panel-row">
            <label for="token-edit-h">height</label>
            <input id="token-edit-h" type="number" name="token-edit-h" min="8" step="1" value="64" disabled />
          </div>
          <div class="tab-panel-row">
            <label for="token-edit-r">angle</label>
            <input
              id="token-edit-r"
              type="number"
              name="token-edit-r"
              min="-180"
              max="180"
              step="1"
              value="0"
              disabled
            />
          </div>
          <button id="token-edit-delete" disabled>Delete</button>
          <br />
          <button id="token-edit-move-up">Move up</button>
          <br />
          <button id="token-edit-move-down">Move down</button>
          <hr />
          <div id="token-list-container">
            <input type="checkbox" id="token-list-checkbox" />
            <label for="token-list-checkbox">Display token list</label>
            <ul id="token-list" class="side-menu-list" style="display: none"></ul>
          </div>
        </section>

        <section id="tab-user" class="tab-panel" hidden>
          <h2>User Settings</h2>
          <hr />
          <label for="user-input-name">Name</label>
          <input id="user-input-name" type="text" name="user-input-name" />
          <label for="user-input-color">Color</label>
          <input id="user-input-color" type="color" name="user-input-color" />
          <hr />
          <ul id="user-list" class="side-menu-list"></ul>
        </section>
      </aside>

      <nav class="sidebar-navigation">
        <button class="tab-close-button" id="sidebar-hide-button"><i class="fa-solid fa-xmark"></i></button>
        <button class="tab-button" data-tab="draw">Draw</button>
        <button class="tab-button" data-tab="grid">Grid</button>
        <button class="tab-button" data-tab="token">Token</button>
        <button class="tab-button" data-tab="user">User</button>
      </nav>
    </div>

    <!-- Whiteboard -->
    <div id="whiteboard-container">
      <svg id="whiteboard" width="100vw" height="100vh">
        <g id="viewport">
          <svg id="whiteboard-background-layer" stroke="black" stroke-width="4">
            <defs>
              <!-- Grid-size is declared through code -->
              <pattern id="grid-pattern" width="50px" height="50px" patternUnits="userSpaceOnUse">
                <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#666" stroke-width="1" />
              </pattern>
            </defs>
            <image id="whiteboard-background-image" width="1024px" height="1024px" />
            <rect id="whiteboard-background-grid" fill="url(#grid-pattern)" width="100%" height="100%" />
          </svg>

          <svg id="whiteboard-objects-layer"></svg>

          <!-- Rectangular hover box -->
          <svg class="whiteboard-resize" id="whiteboard-hover" style="display: none">
            <rect class="resize-marking" id="hover-box" fill="none" />
          </svg>

          <!-- Rectangular Resizebox-->
          <svg class="whiteboard-resize" id="whiteboard-resize" style="display: none">
            <line class="resize-marking" id="rotate-line" />
            <rect class="resize-marking" id="resize-box" fill="none" />

            <rect class="resize-handle" id="handle-tr" data-dir="tl" width="8" height="8" fill="white" stroke="black" />
            <rect class="resize-handle" id="handle-tl" data-dir="tr" width="8" height="8" fill="white" stroke="black" />
            <rect class="resize-handle" id="handle-bl" data-dir="bl" width="8" height="8" fill="white" stroke="black" />
            <rect class="resize-handle" id="handle-br" data-dir="br" width="8" height="8" fill="white" stroke="black" />
            <circle id="rotate-handle" r="6" fill="white" stroke="black" />
          </svg>
          <!-- Line resize -->
          <svg class="whiteboard-resize" id="whiteboard-resize-line" style="display: none">
            <line class="resize-marking" id="resize-line" pointer-events="none" />
            <rect class="resize-handle" id="handle-p1" data-dir="p1" width="8" height="8" fill="white" stroke="black" />
            <rect class="resize-handle" id="handle-p2" data-dir="p2" width="8" height="8" fill="white" stroke="black" />
          </svg>

          <svg id="whiteboard-drawing-layer" width="1024px" height="1024px" style="display: none">
            <!-- Note: this rectangle is required to ensure the layer has something to draw on. -->
            <!-- It also adds a small color effect to when the user is drawing, so they know they are in drawing mode. -->
            <rect fill="#44444411" width="100%" height="100%" />
            <ellipse
              id="whiteboard-drawing-circle"
              fill="none"
              stroke="var(--draw-color)"
              stroke-width="4px"
              style="display: none"
            />
            <rect
              id="whiteboard-drawing-rectangle"
              fill="none"
              stroke="var(--draw-color)"
              stroke-width="4px"
              style="display: none"
            />
            <line id="whiteboard-drawing-line" stroke="var(--draw-color)" stroke-width="4px" style="display: none" />
            <path
              id="whiteboard-drawing-free"
              fill="none"
              stroke="var(--draw-color)"
              stroke-width="10px"
              style="display: none"
              stroke-linecap="round"
            />
            <circle
              id="whiteboard-drawing-cursor"
              fill="var(--draw-color)"
              r="4px"
              stroke="var(--draw-color)"
              stroke-width="1"
            />
          </svg>
<foreignObject id="user-cursors-container" width="1024px" height="1024px" pointer-events="none">
  <div id="user-cursors" width="100%" height="100%"></div>
  </div>
</foreignObject>
</g>
        </svg>
    </div>

    <!-- Server Status -->
    <div id="server-status" class="server-offline">
      <i id="server-status-icon" class="fa-solid fa-xmark"></i>
      <p id="server-status-text">Offline</p>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>

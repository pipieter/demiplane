<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="tabs">
        <button class="tab-button" data-tab="draw">Draw</button>
        <button class="tab-button" data-tab="settings">Settings</button>
        <button class="tab-button" data-tab="token">Token</button>
        <button class="tab-button" data-tab="user">User</button>
      </nav>

      <section id="tab-draw" class="tab-panel">
        <input type="checkbox" id="draw-border-checkbox" />
        <label for="draw-border-checkbox">Border</label>
        <input type="number" id="draw-border-number" min="1" max="100" step="1" value="4" />
        <label for="draw-border-number">Border size</label>
        <button id="begin-circle-button">Add circle</button>
        <button id="begin-rect-button">Add rectangle</button>
        <button id="begin-drawing-button">Begin drawing</button>
        <button><input id="upload-token-button" type="file" accept="image/*" />Upload a token</button>
        <button><input id="upload-background-button" type="file" accept="image/*" />Upload background</button>
      </section>

      <section id="tab-settings" class="tab-panel" hidden>
        <label for="grid-size">size</label>
        <input id="grid-size" type="number" name="grid-size" min="16" max="2048" step="1" value="64" />
        <label for="grid-offset-X">offset X</label>
        <input id="grid-offset-X" type="number" name="grid-offset-X" min="0" step="1" value="0" />
        <label for="grid-offset-Y">offset Y</label>
        <input id="grid-offset-Y" type="number" name="grid-offset-Y" min="0" step="1" value="0" />
      </section>

      <section id="tab-token" class="tab-panel" hidden>
        <label for="token-edit-x">x</label>
        <input id="token-edit-x" type="number" name="token-edit-x" min="0" step="1" value="64" disabled />
        <label for="token-edit-y">y</label>
        <input id="token-edit-y" type="number" name="token-edit-y" min="0" step="1" value="64" disabled />
        <label for="token-edit-w">width</label>
        <input id="token-edit-w" type="number" name="token-edit-w" min="8" step="1" value="64" disabled />
        <label for="token-edit-h">height</label>
        <input id="token-edit-h" type="number" name="token-edit-h" min="8" step="1" value="64" disabled />
        <label for="token-edit-r">angle</label>
        <input id="token-edit-r" type="number" name="token-edit-r" min="-180" max="180" step="1" value="0" disabled />
        <button id="token-edit-delete" disabled>Delete</button>
      </section>
<section id="tab-user" class="tab-panel" hidden>
  <label for="user-input-name">Name</label>
  <input id="user-input-name" type="text" name="user-input-name" />
  <label for="user-input-color">Color</label>
  <input id="user-input-color" type="color" name="user-input-color" />
</section>
    </header>

    <div id="whiteboard-container">
      <svg id="whiteboard" width="100vw" height="100vh">
        <g id="viewport">
          <svg id="whiteboard-background-layer">
            <defs>
              <!-- Grid-size is declared through code -->
              <pattern id="grid-pattern" width="50px" height="50px" patternUnits="userSpaceOnUse">
                <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#666" stroke-width="1" />
              </pattern>
            </defs>
            <image id="whiteboard-background-image" width="1024px" height="1024px" />
            <rect id="whiteboard-background-grid" fill="url(#grid-pattern)" width="100%" height="100%" />
          </svg>

          <svg id="whiteboard-objects-layer"></svg>

          <svg id="whiteboard-resize" style="display: none">
            <line id="rotate-line" stroke="#4da3ff" />
            <rect id="resize-box" fill="none" stroke="#4da3ff" stroke-width="1" pointer-events="none" />

            <rect class="resize-handle" id="handle-tr" data-dir="tl" width="8" height="8" fill="white" stroke="black" />
            <rect class="resize-handle" id="handle-tl" data-dir="tr" width="8" height="8" fill="white" stroke="black" />
            <rect class="resize-handle" id="handle-bl" data-dir="bl" width="8" height="8" fill="white" stroke="black" />
            <rect class="resize-handle" id="handle-br" data-dir="br" width="8" height="8" fill="white" stroke="black" />
            <circle id="rotate-handle" r="6" fill="white" stroke="black" />
          </svg>
          <svg id="whiteboard-drawing-layer" width="1024px" height="1024px" style="display: none">
            <!-- Note: this rectangle is required to ensure the layer has something to draw on. -->
            <!-- It also adds a small color effect to when the user is drawing, so they know they are in drawing mode. -->
            <rect fill="#44444411" width="100%" height="100%" />
            <ellipse
              id="whiteboard-drawing-circle"
              fill="none"
              stroke="black"
              stroke-width="4px"
              style="display: none"
            />
            <rect
              id="whiteboard-drawing-rectangle"
              fill="none"
              stroke="black"
              stroke-width="4px"
              style="display: none"
            />
            <path id="whiteboard-drawing-free" fill="none" stroke="black" stroke-width="10px" style="display: none" />
            <circle id="whiteboard-drawing-cursor" fill="black" r="4px" />
          </svg>
        </g>
      </svg>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>

name: Typescript

on:
    pull_request:
      branches: [main]
      paths:
        - 'client/**'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    prettier:
        # Check if prettier needs to be applied
        runs-on: ubuntu-latest
        name: Prettier
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  submodules: false

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Change directory
              run: cd ./client

            - name: Install dependencies
              run: npm install

            - name: Run prettier
              run: npx prettier package.json "./src/**/*.ts" -c

    eslint:
        runs-on: ubuntu-latest
        name: ESlint
        steps:
            - name: Checkout repo and submodules
              uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
            
            - name: Change directory
              run: cd ./client

            - name: Install dependencies
              run: npm install

            - name: Run eslint
              run: npm run lint
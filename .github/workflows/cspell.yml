name: CSpell

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
            cache: 'npm'
            cache-dependency-path: './client/package-lock.json'
            node-version: '24'

      - name: Run Spell Check
        run: npm run cspell
name: CSpell

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cspell
        run: npm install -g cspell

      - name: Run Spell Check
        run: cspell "**/*.{cs,md,ts,tsx,css,html}" --no-progress
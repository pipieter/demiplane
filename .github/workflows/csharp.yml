name: C#

on:
  pull_request:
    paths:
      - "server/**"
  workflow_dispatch:

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Check analyzers
        run: dotnet format analyzers -v d --severity error --verify-no-changes

      - name: Check style
        run: dotnet format style -v d --severity error --verify-no-changes

  test:
    name: Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Run tests
        run: dotnet test
